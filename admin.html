<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Party Paradise</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logout-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .logout-btn:hover {
      background: white;
      color: #667eea;
      transform: translateY(-2px);
    }

    .section {
      margin-bottom: 50px;
    }

    .section-title {
      color: white;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .table-wrapper {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    th {
      padding: 18px 15px;
      text-align: left;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 12px;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tbody tr {
      transition: all 0.2s ease;
    }

    tbody tr:hover {
      background: #f8f9ff;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .message-cell {
      max-width: 300px;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }

    .email-cell {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
    }

    .date-cell {
      color: #999;
      font-size: 13px;
      white-space: nowrap;
    }

    .action-cell {
      display: flex;
      gap: 10px;
    }

    .delete-btn {
      padding: 8px 12px;
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .delete-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
    }

    .delete-btn:active {
      transform: translateY(0);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
    }

    .stat-number {
      font-size: 36px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
    }

    .stat-label {
      color: #666;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header h1 {
        font-size: 24px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px;
      }

      .message-cell {
        max-width: 150px;
        font-size: 12px;
      }

      .delete-btn {
        padding: 6px 10px;
        font-size: 11px;
      }
    }
  </style>

  <script>
    // 🔐 Login protection
    if (localStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "admin-login.html";
    }

    // 🌐 LIVE BACKEND URL (Render)
    const API_BASE = "https://party-paradise-backend-mr44.onrender.com/api";

    function logout() {
      localStorage.removeItem("adminLoggedIn");
      window.location.href = "admin-login.html";
    }
  </script>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>🎉 Admin Dashboard</h1>
    <a href="#" onclick="logout(); return false;" class="logout-btn">Logout</a>
  </div>

  <div class="stats" id="statsContainer"></div>

  <div class="section">
    <div class="section-title">📩 Contact Messages</div>
    <div class="table-wrapper">
      <div class="table-scroll">
        <table id="contactTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Message</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🎊 Party Bookings</div>
    <div class="table-wrapper">
      <div class="table-scroll">
        <table id="bookingTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Event Date</th>
              <th>Location</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
/* -------- LOAD CONTACTS -------- */
async function loadContacts() {
  try {
    const res = await fetch(`${API_BASE}/contact`);
    const data = await res.json();

    const tbody = document.querySelector("#contactTable tbody");
    tbody.innerHTML = "";

    if (!data || data.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" style="border: none;">
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <p>No contact messages yet</p>
            </div>
          </td>
        </tr>
      `;
      return;
    }

    data.forEach(c => {
      const date = new Date(c.createdAt).toLocaleString();
      tbody.innerHTML += `
        <tr>
          <td style="font-weight: 600; color: #333;">${c.name}</td>
          <td><a href="mailto:${c.email}" class="email-cell">${c.email}</a></td>
          <td style="white-space: nowrap;">${c.phone}</td>
          <td class="message-cell">${c.message.substring(0, 100)}${c.message.length > 100 ? '...' : ''}</td>
          <td class="date-cell">${date}</td>
          <td class="action-cell">
            <button class="delete-btn" onclick="deleteContact('${c._id}')">Delete</button>
          </td>
        </tr>
      `;
    });

    updateStats();
  } catch (error) {
    console.error("Error loading contacts:", error);
  }
}

/* -------- DELETE CONTACT -------- */
async function deleteContact(id) {
  if (!confirm("Are you sure you want to delete this message?")) return;
  
  try {
    await fetch(`${API_BASE}/contact/${id}`, { method: "DELETE" });
    loadContacts();
  } catch (error) {
    console.error("Error deleting contact:", error);
    alert("Failed to delete message");
  }
}

/* -------- LOAD BOOKINGS -------- */
async function loadBookings() {
  try {
    const res = await fetch(`${API_BASE}/bookings`);
    const data = await res.json();

    const tbody = document.querySelector("#bookingTable tbody");
    tbody.innerHTML = "";

    if (!data || data.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" style="border: none;">
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <p>No bookings yet</p>
            </div>
          </td>
        </tr>
      `;
      return;
    }

    data.forEach(b => {
      const eventDate = new Date(b.eventDate).toLocaleDateString();
      tbody.innerHTML += `
        <tr>
          <td style="font-weight: 600; color: #333;">${b.name}</td>
          <td><a href="mailto:${b.email}" class="email-cell">${b.email}</a></td>
          <td style="white-space: nowrap;">${b.phone}</td>
          <td style="white-space: nowrap;">${eventDate}</td>
          <td>${b.location}</td>
          <td class="action-cell">
            <button class="delete-btn" onclick="deleteBooking('${b._id}')">Delete</button>
          </td>
        </tr>
      `;
    });

    updateStats();
  } catch (error) {
    console.error("Error loading bookings:", error);
  }
}

/* -------- DELETE BOOKING -------- */
async function deleteBooking(id) {
  if (!confirm("Are you sure you want to delete this booking?")) return;
  
  try {
    await fetch(`${API_BASE}/bookings/${id}`, { method: "DELETE" });
    loadBookings();
  } catch (error) {
    console.error("Error deleting booking:", error);
    alert("Failed to delete booking");
  }
}

/* -------- UPDATE STATS -------- */
async function updateStats() {
  try {
    const contactRes = await fetch(`${API_BASE}/contact`);
    const contactData = await contactRes.json();
    const contactCount = Array.isArray(contactData) ? contactData.length : 0;

    const bookingRes = await fetch(`${API_BASE}/bookings`);
    const bookingData = await bookingRes.json();
    const bookingCount = Array.isArray(bookingData) ? bookingData.length : 0;

    const statsContainer = document.getElementById("statsContainer");
    statsContainer.innerHTML = `
      <div class="stat-card">
        <div class="stat-number">${contactCount}</div>
        <div class="stat-label">💬 Contact Messages</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${bookingCount}</div>
        <div class="stat-label">🎊 Party Bookings</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${contactCount + bookingCount}</div>
        <div class="stat-label">📊 Total Inquiries</div>
      </div>
    `;
  } catch (error) {
    console.error("Error updating stats:", error);
  }
}

/* -------- INITIAL LOAD -------- */
loadContacts();
loadBookings();
</script>

</body>
</html>
