<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel - Party Paradise</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2,#f093fb);
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container { max-width: 1400px; margin: auto; }

    h1, h2 { color: #fff; margin-bottom: 15px; }

    .logout-btn {
      background: white;
      color: #667eea;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #667eea;
      color: white;
      padding: 12px;
      font-size: 12px;
      text-transform: uppercase;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    tr:hover { background: #f8f8ff; }

    .message-cell {
      max-width: 300px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .view-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 5px;
      font-size: 12px;
    }

    /* ✅ QUICK ACTION BUTTONS */
    .action-btn {
      border: none;
      padding: 6px 8px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 4px;
    }

    .call-btn { background: #2ecc71; color: white; }
    .mail-btn { background: #3498db; color: white; }
    .wa-btn   { background: #25d366; color: white; }
  </style>

  <script>
    if (localStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "admin-login.html";
    }

    const API_BASE = "https://party-paradise-backend-mr44.onrender.com/api";

    function logout() {
      localStorage.removeItem("adminLoggedIn");
      window.location.href = "admin-login.html";
    }
  </script>
</head>

<body>
<div class="container">

  <div style="display:flex;justify-content:space-between;align-items:center">
    <h1>🎉 Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <h2>📩 Contact Messages</h2>

  <!-- 🔍 SEARCH -->
  <input
    type="text"
    id="searchInput"
    class="search-box"
    placeholder="Search by name, email, phone or message..."
    onkeyup="filterContacts()"
  />

  <table id="contactTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Message</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
/* ---------- LOAD CONTACTS ---------- */
async function loadContacts() {
  const res = await fetch(`${API_BASE}/contact`);
  const data = await res.json();
  const tbody = document.querySelector("#contactTable tbody");
  tbody.innerHTML = "";

  data.forEach(c => {
    tbody.innerHTML += `
      <tr>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone}</td>
        <td class="message-cell">
          ${c.message.substring(0, 60)}${c.message.length > 60 ? "..." : ""}
          <br>
          <button class="view-btn" onclick="alert(\`${c.message}\`)">View</button>
        </td>
        <td>${new Date(c.createdAt).toLocaleString()}</td>
        <td>
          <!-- ✅ QUICK ACTIONS -->
          <button class="action-btn call-btn" onclick="callCustomer('${c.phone}')">📞</button>
          <button class="action-btn mail-btn" onclick="mailCustomer('${c.email}')">📧</button>
          <button class="action-btn wa-btn" onclick="whatsappCustomer('${c.phone}')">💬</button>
          <button class="delete-btn" onclick="deleteContact('${c._id}')">🗑️</button>
        </td>
      </tr>
    `;
  });
}

/* ---------- SEARCH FILTER ---------- */
function filterContacts() {
  const value = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.querySelectorAll("#contactTable tbody tr");

  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(value)
      ? ""
      : "none";
  });
}

/* ---------- QUICK ACTION FUNCTIONS ---------- */
function callCustomer(phone) {
  window.open(`tel:${phone}`);
}

function mailCustomer(email) {
  window.open(`mailto:${email}`);
}

function whatsappCustomer(phone) {
  const num = phone.replace(/\D/g, "");
  window.open(`https://wa.me/91${num}`, "_blank");
}

/* ---------- DELETE ---------- */
async function deleteContact(id) {
  if (!confirm("Delete this message?")) return;
  await fetch(`${API_BASE}/contact/${id}`, { method: "DELETE" });
  loadContacts();
}

loadContacts();
</script>

</body>
</html>
