<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    h2 {
      margin-top: 40px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      margin-bottom: 30px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }
    th {
      background: #333;
      color: #fff;
    }
    button {
      padding: 6px 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>

  <script>
    // 🔐 Login protection
    if (localStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "admin-login.html";
    }

    // 🌐 LIVE BACKEND URL (Render)
    const API_BASE = "https://party-paradise-backend-mr44.onrender.com/api";
  </script>
</head>

<body>

<h2>📩 Contact Messages</h2>
<table id="contactTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Message</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>📦 Bookings</h2>
<table id="bookingTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Event Date</th>
      <th>Location</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
/* -------- LOAD CONTACTS -------- */
async function loadContacts() {
  const res = await fetch(`${API_BASE}/contact`);
  const data = await res.json();

  const tbody = document.querySelector("#contactTable tbody");
  tbody.innerHTML = "";

  data.forEach(c => {
    tbody.innerHTML += `
      <tr>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone}</td>
        <td>${c.message}</td>
        <td>${new Date(c.createdAt).toLocaleString()}</td>
        <td>
          <button onclick="deleteContact('${c._id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* -------- DELETE CONTACT -------- */
async function deleteContact(id) {
  if (!confirm("Delete this message?")) return;
  await fetch(`${API_BASE}/contact/${id}`, { method: "DELETE" });
  loadContacts();
}

/* -------- LOAD BOOKINGS -------- */
async function loadBookings() {
  const res = await fetch(`${API_BASE}/bookings`);
  const data = await res.json();

  const tbody = document.querySelector("#bookingTable tbody");
  tbody.innerHTML = "";

  data.forEach(b => {
    tbody.innerHTML += `
      <tr>
        <td>${b.name}</td>
        <td>${b.email}</td>
        <td>${b.phone}</td>
        <td>${b.eventDate}</td>
        <td>${b.location}</td>
        <td>
          <button onclick="deleteBooking('${b._id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* -------- DELETE BOOKING -------- */
async function deleteBooking(id) {
  if (!confirm("Delete this booking?")) return;
  await fetch(`${API_BASE}/bookings/${id}`, { method: "DELETE" });
  loadBookings();
}

/* -------- INITIAL LOAD -------- */
loadContacts();
loadBookings();
</script>

</body>
</html>
